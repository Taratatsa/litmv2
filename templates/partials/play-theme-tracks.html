<div class="theme-card-tracks">
	<div class="theme-card-track">
		<div class="progress-display" data-id="system.quest.tracks.abandon.value" role="group"
			aria-label="{{localize 'LITM.Themes.abandon'}}">
			{{#progress-buttons system.quest.tracks.abandon.value 3}}
			<button type="button" class="progress-box {{#if @checked}}checked{{/if}}" data-action="adjustProgress"
				data-index="{{@index}}" aria-pressed="{{#if @checked}}true{{else}}false{{/if}}">
				<img src="systems/litmv2/assets/media/checkbox{{ifThen @checked '-c' ''}}.svg" />
			</button>
			{{/progress-buttons}}
		</div>
		<label>{{localize "LITM.Themes.abandon"}}</label>
	</div>
	<div class="theme-card-track">
		{{#if (eq system.improve.value 3)}}
		<button type="button" data-action="openThemeAdvancement" data-item-id="{{_id}}"
			data-tooltip="{{localize 'LITM.Ui.choose_improvement'}}" aria-label="{{localize 'LITM.Ui.choose_improvement'}}"
			style="margin-top: 0.25rem;">
			<i class="fa-solid fa-wand-magic-sparkles" aria-hidden="true"></i>
		</button>
		{{/if}}
		<div class="progress-display" data-id="system.improve.value" role="group"
			aria-label="{{localize 'LITM.Ui.improve'}}">
			{{#progress-buttons system.improve.value 3}}
			<button type="button" class="progress-box {{#if @checked}}checked{{/if}}" data-action="adjustProgress"
				data-index="{{@index}}" aria-pressed="{{#if @checked}}true{{else}}false{{/if}}">
				<img src="systems/litmv2/assets/media/checkbox{{ifThen @checked '-c' ''}}.svg" />
			</button>
			{{/progress-buttons}}
		</div>
		<label>{{localize "LITM.Ui.improve"}}</label>
	</div>
	<div class="theme-card-track">
		<div class="progress-display" data-id="system.quest.tracks.milestone.value" role="group"
			aria-label="{{localize 'LITM.Themes.milestone'}}">
			{{#progress-buttons system.quest.tracks.milestone.value 3}}
			<button type="button" class="progress-box {{#if @checked}}checked{{/if}}" data-action="adjustProgress"
				data-index="{{@index}}" aria-pressed="{{#if @checked}}true{{else}}false{{/if}}">
				<img src="systems/litmv2/assets/media/checkbox{{ifThen @checked '-c' ''}}.svg" />
			</button>
			{{/progress-buttons}}
		</div>
		<label>{{localize "LITM.Themes.milestone"}}</label>
	</div>
</div>
