<section class="standard-form scrollable">
	<!-- Header -->
	<header class="img-name">
		<img
			class="profile-img noflex"
			src="{{document.img}}"
			alt="{{document.name}}"
			data-edit="img"
			data-action="editImage"
			role="button"
			tabindex="0"
			data-tooltip="{{localize 'LITM.Ui.edit_image'}}"
		/>
		<input
			class="flex1"
			type="text"
			name="name"
			value="{{name}}"
			placeholder="{{localize 'LITM.Ui.backpack_name'}}"
		/>
	</header>

	<!-- Tags -->
	<fieldset>
		{{> systems/litmv2/templates/partials/control-legend.html label="LITM.Tags.contents" action="addTag" tooltip="LITM.Ui.add_tag"}}
		{{#if tags.length}}
		<ul class="plain">
			{{#each tags as |tag|}}
			<li class="form-group {{#if tag.disabled}}inactive{{/if}}">
				<input
					type="checkbox"
					name="effects.{{tag._id}}.isActive"
					{{checked (not tag.disabled)}}
					data-dtype="Boolean"
				/>

				<input
					class="flex1"
					type="text"
					name="effects.{{tag._id}}.name"
					value="{{tag.name}}"
					placeholder="{{localize 'LITM.Ui.tag_name'}}"
				/>

				<label class="litm--single-use-label" data-tooltip="{{localize 'LITM.Terms.single_use'}}">
					<input class="litm--single-use" type="checkbox" name="effects.{{tag._id}}.system.isSingleUse"
						{{checked tag.isSingleUse}} data-dtype="Boolean" />
					<i class="fa-solid fa-hourglass-half litm--single-use-indicator" aria-hidden="true"></i>
				</label>

				<button
					style="flex: none"
					type="button"
					data-action="removeTag"
					data-effect-id="{{tag._id}}"
					data-tooltip="{{localize 'LITM.Ui.remove_tag'}}"
					aria-label="{{localize 'LITM.Ui.remove_tag'}}"
				>
					<i class="fa-solid fa-trash" aria-hidden="true"></i>
				</button>
			</li>
			{{/each}}
		</ul>
		{{else}}
		<p class="hint" style="text-align: center; padding: 1rem">{{localize "LITM.Ui.no_items"}}</p>
		{{/if}}
	</fieldset>
</section>
